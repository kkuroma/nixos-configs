$mainMod = SUPER # Sets "Windows" key as main modifier
$BROWSER = zen-browser

# Cheat sheet
bind = $mainMod, K, exec, sh -c "walker -m menus:cheatsheet" # Cheat sheet (THIS!)

# Logout
bind = $mainMod, ESCAPE, exec, sh -c "walker -m menus:power-menu" # Launch power menu

# Zoom
bind = $mainMod, mouse_down, exec, hyprctl -q keyword cursor:zoom_factorN $(hyprctl getoption cursor:zoom_factor -j | jq '.float * 1.5')
bind = $mainMod, mouse_up, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '(.float * 0.7) | if . < 1 then 1 else . end')

# Quick Actions
bind = $mainMod SHIFT, P, exec, sh -c "walker -m menus:packages" # Package center
bind = $mainMod, Grave, exec, sh -c "walker -m menus:quick-actions -t grid-actions" # Open quick actions
bind = CTRL SHIFT, I, exec, sh -c "walker -m menus:icon-picker" # Pick Nerd (I)cons
bind = CTRL SHIFT, E, exec, sh -c 'walker -m menus:emoji-picker' # Pick (E)mojis
bind = $mainMod CTRL, V, exec, sh -c 'walker --provider clipboard' # Open clipboard manager
bind = CTRL SHIFT, S, exec, sh -c '~/.config/hypr/scripts/take-screenshot.sh' # Take (S)creenshot
bind = $mainMod SHIFT, N, exec, sh -c "walker -m menus:wifi" # Open (N)etwork Manager
bind = $mainMod, backslash, exec, sh -c '~/.config/hypr/scripts/color-picker.sh' # Color picker
bind = $mainMod, N, exec, sh -c 'sleep 0.1 && swaync-client -t -sw' # Open (N)otification Manager

# Styling
bind = $mainMod, R, exec, sh -c '~/.config/hypr/scripts/reload-styles.sh' # (R)eload style
bind = $mainMod SHIFT, R, exec, sh -c '~/.config/waybar/launch-waybar.sh 1' # Switch waybar orientation
bind = $mainMod, W, exec, sh -c 'walker -m menus:choose-wallpaper' # Select wallpaper
bind = $mainMod SHIFT, W, exec, sh -c "walker -m menus:apply-wallpaper -t colorpicker" # Select color theme

# Applicaitions
bind = $mainMod, T, exec, $terminal # Open (T)erminal
bind = $mainMod SHIFT, T, exec, $terminal --class floating --title floating # Open floating terminal
bind = $mainMod SHIFT, D, exec, sh -c "~/.config/hypr/scripts/dispatch-terminals.sh" # Open starter terminals
bind = CTRL SHIFT, ESCAPE, exec, kitty --class floating --title floating -e sh -c "while true; do btop; sleep 0.1; done" & # Open system monitor
bind = $mainMod, SPACE, exec, sh -c walker # Application launcher
bind = $mainMod, E, exec, $fileManager # Open file manager
bind = $mainMod, C, exec, sh -c "codium --ozone-platform=wayland"  # Open VS(C)ode
bind = $mainMod SHIFT, C, exec, kitty --class floating -e sh -c '~/.config/hypr/scripts/code-launcher.sh 0' # Open file/directory in VS(C)Code
bind = $mainMod, V, exec, sh -c "kitty --class neovim -e nvim ~/"  # Open Neo(V)im
bind = $mainMod SHIFT, V, exec, kitty --class floating -e sh -c '~/.config/hypr/scripts/code-launcher.sh 1' # Open file/directory in Neo(V)im
bind = $mainMod, B, exec, $BROWSER # Open (B)rowser

# Window control
bindm = $mainMod, mouse:272, movewindow # Move window
bindm = $mainMod, mouse:273, resizewindow # Resize window
bind = $mainMod, Q, killactive, # Force (Q)uit window
bind = $mainMod SHIFT, ESCAPE, exit, # Log out
bind = $mainMod, L, exec, hyprlock # Trigger (L)ock screen
bind = $mainMod, F, togglefloating, # Toggle (F)loating window
bind = $mainMod, M, fullscreen, 0 # Toggle (M)azimixed window
bind = $mainMod, P, pseudo, # Toggle (P)seudo tiling
bind = $mainMod, J, togglesplit, # Toggle tiling split
bind = $mainMod, left, movefocus, l # Move focus to left 
bind = $mainMod, right, movefocus, r # Move focus to right
bind = $mainMod, up, movefocus, u # Move focus up
bind = $mainMod, down, movefocus, d # Move focus down
bind = $mainMod, G, togglegroup # Toggle (G)rouped windows
bind = $mainMod SHIFT, G, lockactivegroup, toggle # Lock a tab group
bind = $mainMod, tab, changegroupactive, f  # Focus next tab
bind = $mainMod SHIFT, tab, changegroupactive, b # Focus previous tab

# Workspaces
bind = ALT, bracketleft, exec, sh -c "~/.config/waybar/scripts/workspace-scroll.sh up" # Move down 1 workspace
bind = ALT, bracketright, exec, sh -c "~/.config/waybar/scripts/workspace-scroll.sh down" # Move up 1 workspace
bind = $mainMod SHIFT, L, exec, sh -c "walker -m menus:layout-switcher" # Open (L)ayout Menu
bind = $mainMod SHIFT, A, exec, sh -c "~/.config/elephant/scripts/layout-switch.sh scrolling" # Set layout (scrolling)
bind = $mainMod SHIFT, S, exec, sh -c "~/.config/elephant/scripts/layout-switch.sh dwindle" # Set layout (dwindle)
bind = $mainMod SHIFT, Z, exec, sh -c "~/.config/elephant/scripts/layout-switch.sh master" # Set laytout (master)
bind = $mainMod SHIFT, X, exec, sh -c "~/.config/elephant/scripts/layout-switch.sh monocle" # Set layout (monocle)
bind = ALT, Tab, workspace, previous # Jump to last visited workspace
bind = $mainMod, S, exec, sh -c "/home/kuroma/.config/hypr/scripts/drawer.sh" # Spawn (S)ecret workspace

# Windows control
bind = ALT SHIFT, bracketleft, layoutmsg, move -col # Scroll left
bind = ALT SHIFT, bracketright, layoutmsg, move +col # Scroll right
bind = ALT, minus, layoutmsg, colresize -0.1 # Decrease width
bind = ALT, equal, layoutmsg, colresize +0.1 # Increase width
bind = ALT, comma, layoutmsg, swapcol l # Scroll stack left
bind = ALT, period, layoutmsg, swapcol r # Scroll stack right
bind = ALT SHIFT, bracketleft, layoutmsg, cyclenext 
bind = ALT SHIFT, bracketright, layoutmsg, cyclenext 
bind = $mainMod SHIFT, up, resizeactive, 0 -20 # Extend window up
bind = $mainMod SHIFT, down, resizeactive, 0 20 # Extend window down
bind = $mainMod SHIFT, left, resizeactive, -20 0 # Extend window left
bind = $mainMod SHIFT, right, resizeactive, 20 0 # Extend window right

# Move to workspace with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1 # Move to wsp [0-9]
bind = $mainMod, 2, workspace, 2 
bind = $mainMod, 3, workspace, 3 
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5 
bind = $mainMod, 6, workspace, 6 
bind = $mainMod, 7, workspace, 7 
bind = $mainMod, 8, workspace, 8 
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Support for workspaces 11-20
bind = $mainMod ALT, 1, workspace, 11 # Move to wsp [10-19]
bind = $mainMod ALT, 2, workspace, 12 
bind = $mainMod ALT, 3, workspace, 13 
bind = $mainMod ALT, 4, workspace, 14 
bind = $mainMod ALT, 5, workspace, 15 
bind = $mainMod ALT, 6, workspace, 16 
bind = $mainMod ALT, 7, workspace, 17 
bind = $mainMod ALT, 8, workspace, 18 
bind = $mainMod ALT, 9, workspace, 19
bind = $mainMod ALT, 0, workspace, 20

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # Move to workspace 1 (1-10)
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window to a workspace, support for workspaces 11-20
bind = $mainMod ALT SHIFT, 1, movetoworkspace, 11 # Move to workspace 11 (11-20)
bind = $mainMod ALT SHIFT, 2, movetoworkspace, 12
bind = $mainMod ALT SHIFT, 3, movetoworkspace, 13
bind = $mainMod ALT SHIFT, 4, movetoworkspace, 14
bind = $mainMod ALT SHIFT, 5, movetoworkspace, 15
bind = $mainMod ALT SHIFT, 6, movetoworkspace, 16
bind = $mainMod ALT SHIFT, 7, movetoworkspace, 17
bind = $mainMod ALT SHIFT, 8, movetoworkspace, 18
bind = $mainMod ALT SHIFT, 9, movetoworkspace, 19
bind = $mainMod ALT SHIFT, 0, movetoworkspace, 20

# Screen control
bind = ALT, semicolon, focusmonitor, l
bind = ALT, apostrophe, focusmonitor, r
bind = ALT SHIFT, semicolon, movewindow, mon:l
bind = ALT SHIFT, apostrophe, movewindow, mon:r

# Media control
bind = CTRL SHIFT, SPACE, exec, playerctl play-pause # Play/Pause
bind = CTRL SHIFT, bracketleft, exec, playerctl previous # Play previous song
bind = CTRL SHIFT, bracketright, exec, playerctl next # Play next song
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPause, exec, playerctl play-pause 
bindl = , XF86AudioPlay, exec, playerctl play-pause

# Hardware buttons (the function keys)
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bind = , Print, exec, sh -c "~/.config/hypr/scripts/take-static-screenshot.sh 0" # Screenshot (static)
bind = SHIFT, Print, exec, sh -c "~/.config/hypr/scripts/take-static-screenshot.sh 1" # Screenshot (editable)
bind = , code:234, exec, sh -c "walker -m menus:quick-actions -t grid-actions"
bindn = , mouse:273, exec, sh -c '[[ $(hyprctl activewindow) == *"Invalid"* ]] && walker -m menus:quick-actions -t grid-actions'
