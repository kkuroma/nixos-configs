general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = $primary $secondary 45deg
    col.inactive_border = $outline_variant
    allow_tearing = false
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
    layout = scrolling
}

group {
    col.border_active = $secondary
    col.border_locked_active = $primary
    col.border_inactive = $outline_variant
    col.border_locked_inactive = $outline_variant
    groupbar {
        indicator_gap = 0
        indicator_height = 0
        gradient_rounding = 0
        font_family = MapleMono NF CN
        font_size = 12
        height = 14
        col.active = $secondary
        col.locked_active = $primary
        text_color = $on_primary
        col.inactive = $surface_container_high
        col.locked_inactive = $surface_container_high
        text_color_inactive = $on_surface
        gradients = true
        gaps_in = 0
        gaps_out = 0
        priority = -1
    }
}

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = $shadow
    }
    blur {
        enabled = true
        new_optimizations = true
        ignore_opacity = true
        size = 3
        passes = 3 
        noise = 0.01
        contrast = 1.0
        brightness = 1.0
        vibrancy = 0.5
    }
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
}