source = ~/.config/hypr/components/colors.conf
$image = ~/.cache/last_wallpaper_static.jpg

general {
    hide_cursor = true
    ignore_empty_input = true
}

auth {
    fingerprint {
        enabled = true
    }
}

background {
    monitor =
    path = $image
    blur_passes = 3
    blur_size = 10
    vibrancy_darkness = 0.2
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = $on_surface_variant
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $primary
    font_size = 140
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = 󱠡  Welcome, $USER
    color = $secondary
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = $primary_container
    inner_color = $surface_container
    font_color = $on_surface
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = false
    placeholder_text = 󰌾 Enter password or fingerprint...
    check_color = $primary
    fail_color = $error
    fail_text = 󰅙 Authentication failed
    hide_input = false
    rounding = 12
    position = 0, -120
    halign = center
    valign = center
}
