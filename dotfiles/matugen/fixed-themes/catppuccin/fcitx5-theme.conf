[Metadata]
Name=Material You
Version=1.0
Author=Matugen
Description=Material You theme for fcitx5

[InputPanel]
# Text color (also affects EN/JP indicator)
NormalColor=#cdd6f4
# Background color
BackgroundColor=#45475a
# Highlight background
HighlightColor=#cba6f7
# Highlight text color
HighlightCandidateColor=#1e1e2e
# Highlight label text color
HighlightTextColor=#cdd6f4
# Normal candidate text color
CandidateTextColor=#cdd6f4
# Normal label text color
NormalTextColor=#cdd6f4
# Preedit text color (text you're typing)
PreeditColor=#cdd6f4
# Auxiliary text color (EN/JP indicator, etc.)
AuxiliaryTextColor=#cdd6f4

[InputPanel/TextMargin]
Left=12
Right=12
Top=8
Bottom=8

[InputPanel/Background]
Color=#45475a
BorderColor=#cba6f7
BorderWidth=2

[InputPanel/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[InputPanel/Highlight]
Color=#cba6f7

[InputPanel/Highlight/Margin]
Left=8
Right=8
Top=6
Bottom=6

[Menu]
NormalColor=#45475a
HighlightColor=#cba6f7
NormalTextColor=#cdd6f4
Spacing=4

[Menu/Background]
Color=#45475a
BorderColor=#cba6f7
BorderWidth=2

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#cba6f7

[Menu/Separator]
Color=#585b70

[Menu/TextMargin]
Left=8
Right=8
Top=4
Bottom=4
