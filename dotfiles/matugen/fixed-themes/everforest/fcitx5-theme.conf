[Metadata]
Name=Material You
Version=1.0
Author=Matugen
Description=Material You theme for fcitx5

[InputPanel]
# Text color (also affects EN/JP indicator)
NormalColor=#d3c6aa
# Background color
BackgroundColor=#475258
# Highlight background
HighlightColor=#a7c080
# Highlight text color
HighlightCandidateColor=#2d353b
# Highlight label text color
HighlightTextColor=#d3c6aa
# Normal candidate text color
CandidateTextColor=#d3c6aa
# Normal label text color
NormalTextColor=#d3c6aa
# Preedit text color (text you're typing)
PreeditColor=#d3c6aa
# Auxiliary text color (EN/JP indicator, etc.)
AuxiliaryTextColor=#d3c6aa

