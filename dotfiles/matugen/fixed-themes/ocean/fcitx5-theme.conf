[Metadata]
Name=Material You
Version=1.0
Author=Matugen
Description=Material You theme for fcitx5

[InputPanel]
# Text color (also affects EN/JP indicator)
NormalColor=#a6accd
# Background color
BackgroundColor=#292d3e
# Highlight background
HighlightColor=#82aaff
# Highlight text color
HighlightCandidateColor=#0f111a
# Highlight label text color
HighlightTextColor=#a6accd
# Normal candidate text color
CandidateTextColor=#a6accd
# Normal label text color
NormalTextColor=#a6accd
# Preedit text color (text you're typing)
PreeditColor=#a6accd
# Auxiliary text color (EN/JP indicator, etc.)
AuxiliaryTextColor=#a6accd

[InputPanel/TextMargin]
Left=12
Right=12
Top=8
Bottom=8

[InputPanel/Background]
Color=#292d3e
BorderColor=#82aaff
BorderWidth=2

[InputPanel/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[InputPanel/Highlight]
Color=#82aaff

[InputPanel/Highlight/Margin]
Left=8
Right=8
Top=6
Bottom=6

[Menu]
NormalColor=#292d3e
HighlightColor=#82aaff
NormalTextColor=#a6accd
Spacing=4

[Menu/Background]
Color=#292d3e
BorderColor=#82aaff
BorderWidth=2

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#82aaff

[Menu/Separator]
Color=#292d3e

[Menu/TextMargin]
Left=8
Right=8
Top=4
Bottom=4
