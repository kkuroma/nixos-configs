[Metadata]
Name=Material You
Version=1.0
Author=Matugen
Description=Material You theme for fcitx5

[InputPanel]
# Text color (also affects EN/JP indicator)
NormalColor=#e0def4
# Background color
BackgroundColor=#44415a
# Highlight background
HighlightColor=#c4a7e7
# Highlight text color
HighlightCandidateColor=#232136
# Highlight label text color
HighlightTextColor=#e0def4
# Normal candidate text color
CandidateTextColor=#e0def4
# Normal label text color
NormalTextColor=#e0def4
# Preedit text color (text you're typing)
PreeditColor=#e0def4
# Auxiliary text color (EN/JP indicator, etc.)
AuxiliaryTextColor=#e0def4

[InputPanel/TextMargin]
Left=12
Right=12
Top=8
Bottom=8

[InputPanel/Background]
Color=#44415a
BorderColor=#c4a7e7
BorderWidth=2

[InputPanel/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[InputPanel/Highlight]
Color=#c4a7e7

[InputPanel/Highlight/Margin]
Left=8
Right=8
Top=6
Bottom=6

[Menu]
NormalColor=#44415a
HighlightColor=#c4a7e7
NormalTextColor=#e0def4
Spacing=4

[Menu/Background]
Color=#44415a
BorderColor=#c4a7e7
BorderWidth=2

[Menu/Background/Margin]
Left=2
Right=2
Top=2
Bottom=2

[Menu/Highlight]
Color=#c4a7e7

[Menu/Separator]
Color=#56526e

[Menu/TextMargin]
