theme = "matugen"

[providers]
# Providers that search by default without a prefix
default = ["desktopapplications", "calc", "runner", "websearch"]
max_results = 1000

# Define prefixes for manual triggers
[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = ">"
provider = "runner"

[[providers.prefixes]]
prefix = "?"
provider = "websearch"

# Wallpaper actions: Return = color picker, Shift+Return = quick apply
[[providers.actions."menus:choose-wallpaper"]]
action = "activate"
bind = "Return"
label = "select colors"
default = true

[[providers.actions."menus:choose-wallpaper"]]
action = "quick_apply"
bind = "shift Return"
label = "quick apply"

[placeholders.default]
input = "Search..."
list = "No results"

[placeholders."menus:choose-wallpaper"]
input = "Search wallpapers..."
list = "No wallpapers found"

[placeholders."menus:apply-wallpaper"]
