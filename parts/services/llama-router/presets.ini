[GLM-4.7-Flash]
model = /Vault/llm-models/models/GLM-4.7-Flash-IQ4_XS.gguf
c = 65536
b = 16384
ub = 512
parallel = 4

[GLM-4.7-Flash-Code]
model = /Vault/llm-models/models/GLM-4.7-Flash-IQ4_XS.gguf
c = 131072
b = 16384
ub = 512
temp = 1.0
top-p = 0.95
min-p = 0.01

# Three archetypes per size:
#   <base>    parallel serving, no vision
#   -Code     single-stream (long ctx) for narration / generation
#   -Vision   single-stream + mmproj (reads PDF figures), smaller ctx to fit the projector
[Gemma-4-26B]
model = /Vault/llm-models/models/gemma-4-26B-A4B-it-MXFP4_MOE.gguf
c = 65536
b = 16384
ub = 512
parallel = 4

[Gemma-4-26B-Code]
model = /Vault/llm-models/models/gemma-4-26B-A4B-it-MXFP4_MOE.gguf
# MTP (multi-token prediction) speculative decoding via the gemma4-assistant
# NextN head. Needs llama-cpp >= b9568 (gemma4-assistant arch). spec-draft-n-max
# tunable. Measured on a 3090 (greedy, 512-tok code-gen): 107.6 -> 180.1 tok/s
# = 1.67x, ~71% draft acceptance. Draft adds ~1.1 GiB VRAM (->~19 GiB @ c=131072).
# (A4B activates only ~4B params, so MoE decode is memory-bound and MTP helps.)
model-draft = /Vault/llm-models/models/gemma-4-26B-A4B-it-mtp.gguf
spec-type = draft-mtp
spec-draft-n-max = 4
c = 131072
b = 16384
ub = 512
parallel = 1
temp = 1.0
top-p = 0.95
min-p = 0.01

[Gemma-4-26B-Vision]
model = /Vault/llm-models/models/gemma-4-26B-A4B-it-MXFP4_MOE.gguf
mmproj = /Vault/llm-models/models/gemma-4-26B-A4B-it-mmproj-BF16.gguf
# MTP + mmproj together is the most experimental combo — drop the two
# model-draft/spec-type lines if vision decode misbehaves.
model-draft = /Vault/llm-models/models/gemma-4-26B-A4B-it-mtp.gguf
spec-type = draft-mtp
spec-draft-n-max = 4
c = 32768
b = 8192
ub = 512
parallel = 1

# Dense 12B (Q8) — fallback if 26B + projector OOMs (less VRAM).
[Gemma-4-12B]
model = /Vault/llm-models/models/gemma-4-12b-it-Q8_0.gguf
c = 65536
b = 8192
ub = 512
parallel = 4

[Gemma-4-12B-Code]
model = /Vault/llm-models/models/gemma-4-12b-it-Q8_0.gguf
# Dense 12B — best MTP candidate. Measured on a 3090 (greedy, 512-tok code-gen):
# 45.1 -> 108.1 tok/s = 2.40x, ~67% draft acceptance. Draft adds ~0.7 GiB VRAM
# (->~14 GiB @ c=65536).
model-draft = /Vault/llm-models/models/gemma-4-12b-it-mtp.gguf
spec-type = draft-mtp
spec-draft-n-max = 4
c = 65536
b = 8192
ub = 512
parallel = 1
temp = 1.0
top-p = 0.95
min-p = 0.01

[Gemma-4-12B-Vision]
model = /Vault/llm-models/models/gemma-4-12b-it-Q8_0.gguf
mmproj = /Vault/llm-models/models/gemma-4-12b-it-mmproj-BF16.gguf
# MTP + mmproj together is experimental — drop these two lines if vision misbehaves.
model-draft = /Vault/llm-models/models/gemma-4-12b-it-mtp.gguf
spec-type = draft-mtp
spec-draft-n-max = 4
c = 32768
b = 8192
ub = 512
parallel = 1

